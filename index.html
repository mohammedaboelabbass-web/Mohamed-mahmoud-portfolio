  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

80,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#44F5A8&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showChart&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showScreenshots&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  rootRefFn = (el) => {\n    this._root = el;\n    if (el) el.style.setProperty('--accent', this.props.accent ?? '#44F5A8');\n  };\n\n  state = { lightbox: null, vw: (typeof window !== 'undefined' ? window.innerWidth : 1280) };\n  openShot = (src) => this.setState({ lightbox: src });\n  closeShot = () => this.setState({ lightbox: null });\n  _onResize = () => { const w = window.innerWidth; if (w !== this.state.vw) this.setState({ vw: w }); };\n\n  componentDidMount() {\n    this.applyAccent();\n    window.addEventListener('resize', this._onResize);\n    this._onResize();\n  }\n  componentWillUnmount() { window.removeEventListener('resize', this._onResize); }\n  componentDidUpdate() { this.applyAccent(); }\n\n  applyAccent() {\n    if (this._root) this._root.style.setProperty('--accent', this.props.accent ?? '#44F5A8');\n  }\n\n  renderVals() {\n    const vw = this.state.vw || 1280;\n    const isMobile = vw <= 760;\n    const heroStats = [\n      { value: '7,000+', label: 'Leads delivered' },\n      { value: '150,000+', label: 'SAR managed' },\n      { value: '4', label: 'Ad platforms' },\n      { value: '5', label: 'Clients' },\n    ];\n    const platforms = ['Meta Ads', 'Snapchat Ads', 'TikTok Ads', 'Google Ads'];\n    const showScreenshots = this.props.showScreenshots ?? true;\n    const logos = [\n      { src: 'img/logo-waqf.png', name: 'Waqf — KAU Endowment', url: 'https://lms.waqf.org.sa/' },\n      { src: 'img/logo-prox.png', name: 'Pro X', url: 'https://www.ub.edu.sa/ar/Pages/default.aspx' },\n      { src: 'img/logo-betraining.png', name: 'BE Training', url: 'https://betraining.com.sa/en' },\n      { src: 'img/logo-bepioneer.png', name: 'BE Pioneer', url: 'https://oc.edu.sa/ar' },\n      { src: 'img/logo-client5.png', name: 'Najd El Jannob', url: null },\n    ];\n\n    const mk = (channels) => channels.map((c) => ({\n      ...c,\n      hasStats: Array.isArray(c.stats) && c.stats.length > 0,\n      stats: c.stats || [],\n      shot: c.shot || null,\n      showShot: showScreenshots && !!c.shot,\n      open: () => this.openShot(c.shot),\n      shotScrollStyle: c.wideShot\n        ? { overflowX: 'auto', overflowY: 'hidden', WebkitOverflowScrolling: 'touch' }\n        : {},\n      shotImgStyle: c.wideShot\n        ? { display: 'block', height: '52px', width: 'auto', maxWidth: 'none' }\n        : { display: 'block', width: '100%', height: 'auto' },\n    }));\n\n    const clients = [\n      {\n        no: '01', tag: 'First client', name: 'Waqf Programs', logo: 'img/logo-waqf.png', link: 'https://lms.waqf.org.sa/',\n        sector: 'Governance · Fellowships · Professional development',\n        featured: 'img/shot-waqf-breakdown.png',\n        channels: mk([\n          { badge: 'M', platform: 'Meta Ads', value: '3,500+', label: 'Leads generated', stats: [{ v: '$1.03', l: 'CPL' }], note: 'Across governance, fellowship and professional development tracks.' },\n          { badge: 'S', platform: 'Snapchat Ads', value: '1,231', label: 'Leads', stats: [{ v: '15.91 SAR', l: 'CPL' }], note: 'Lead-gen for education & training programs targeting professionals in KSA.', shot: 'img/shot-waqf-snap.png' },\n          { badge: 'T', platform: 'TikTok Ads', value: '748', label: 'Conversions', stats: [{ v: '10.67 SAR', l: 'Cost / result' }, { v: '909K+', l: 'Impressions' }], note: 'Governance and fellowship programs in KSA.', shot: 'img/shot-waqf-tiktok.png' },\n          { badge: '✦', platform: 'HR Programs · Sales', value: '11.3x', label: 'Return on ad spend', stats: [{ v: '452,430 SAR', l: 'Sales value' }], note: 'Generated 452,430 SAR in sales for Waqf\\u2019s Human Resource programs — turning every 1 SAR spent into 11+ SAR in revenue.' },\n        ]),\n      },\n      {\n        no: '02', tag: 'Second client', name: 'BE Training', logo: 'img/logo-betraining.png', link: 'https://betraining.com.sa/en',\n        sector: 'Professional training · KSA',\n        channels: mk([\n          { badge: 'M', platform: 'Meta Ads', value: '162', label: 'Leads', stats: [{ v: '47 SAR', l: 'Cost / lead' }, { v: '7,629 SAR', l: 'Spend' }], note: 'Targeting working professionals in KSA.', shot: 'img/shot-betraining-meta.png' },\n          { badge: 'S', platform: 'Snapchat Ads', value: '1,099', label: 'Leads', stats: [{ v: '70,017 SAR', l: 'Budget managed' }], note: 'Working professionals across KSA.', shot: 'img/shot-betraining-snap.png' },\n          { badge: 'T', platform: 'TikTok Ads', value: '136', label: 'Leads', stats: [{ v: '49.2 SAR', l: 'Cost / lead' }, { v: '6,690 SAR', l: 'Spend' }], note: 'Tested and scaled a new platform for the client.', shot: 'img/shot-betraining-tiktok.png', wideShot: true },\n        ]),\n      },\n      {\n        no: '03', tag: 'Third client', name: 'PRO X', logo: 'img/logo-prox.png', link: 'https://www.ub.edu.sa/ar/Pages/default.aspx',\n        sector: 'Education & training · KSA',\n        channels: mk([\n          { badge: 'M', platform: 'Meta Ads', value: '1,060', label: 'Leads', stats: [{ v: '18.94 SAR', l: 'CPL' }, { v: '20,076 SAR', l: 'Spend' }], note: 'High-volume lead generation on Meta.', shot: 'img/shot-prox-meta.png', wideShot: true },\n          { badge: 'S', platform: 'Snapchat Ads', value: '1,001', label: 'Leads', stats: [{ v: '26.5 SAR', l: 'CPL' }, { v: '26,546 SAR', l: 'Spend' }], note: 'Sustained lead-gen across Snapchat.', shot: 'img/shot-prox-snap.png', wideShot: true },\n          { badge: 'T', platform: 'TikTok Ads', value: '263', label: 'Leads', stats: [{ v: '25.4 SAR', l: 'CPL' }, { v: '630K+', l: 'Impressions' }], note: 'Reaching audiences across KSA.', shot: 'img/shot-prox-tiktok.png', wideShot: true },\n        ]),\n      },\n      {\n        no: '04', tag: 'Fourth client', name: 'BE Pioneer', logo: 'img/logo-bepioneer.png', link: 'https://oc.edu.sa/ar',\n        sector: 'Professional certification programs · KSA',\n        channels: mk([\n          { badge: 'M', platform: 'Meta Ads', value: '565', label: 'Leads', stats: [], note: 'Professional certification programs in KSA.', shot: 'img/shot-bepioneer-meta.png' },\n          { badge: 'S', platform: 'Snapchat Ads', value: '291', label: 'Leads', stats: [], note: 'Professional certification programs in KSA.', shot: 'img/shot-bepioneer-snap.png' },\n        ]),\n      },\n      {\n        no: '05', tag: 'Fifth client', name: 'Najd El Jannob', logo: 'img/logo-client5.png',\n        sector: 'Google Search advertising · KSA',\n        channels: mk([\n          { badge: 'G', platform: 'Google Ads', value: '4,785', label: 'Clicks', stats: [{ v: '1.77 SAR', l: 'CPC' }, { v: '152K+', l: 'Impressions' }], note: 'Search campaigns expanding client reach.', shot: 'img/shot-client5-google.png' },\n        ]),\n      },\n    ];\n\n    clients.forEach((cl) => {\n      cl.shots = cl.channels.filter((c) => c.showShot).map((c) => ({\n        badge: c.badge,\n        platform: c.platform,\n        shot: c.shot,\n        open: c.open,\n        scrollStyle: c.shotScrollStyle,\n        imgStyle: c.shotImgStyle,\n      }));\n      cl.hasShots = cl.shots.length > 0;\n      cl.hasFeatured = !!cl.featured;\n    });\n\n    return {\n      rootRef: this.rootRefFn,\n      heroStats, platforms, logos, clients,\n      caseRowStyle: {\n        display: 'grid',\n        gridTemplateColumns: isMobile ? '1fr' : 'minmax(240px,300px) 1fr',\n        gap: 'clamp(20px,3vw,40px)',\n        alignItems: 'start',\n        paddingTop: 'clamp(24px,4vw,44px)',\n        borderTop: '1px solid rgba(255,255,255,0.08)',\n      },\n      navMidStyle: {\n        display: isMobile ? 'none' : 'flex',\n        alignItems: 'center',\n        gap: '34px',\n      },\n      lightbox: this.state.lightbox,\n      lightboxImgStyle: {\n        width: '100%', height: '100%',\n        backgroundImage: this.state.lightbox ? 'url(\"' + this.state.lightbox + '\")' : 'none',\n        backgroundSize: 'contain', backgroundPosition: 'center', backgroundRepeat: 'no-repeat',\n        filter: 'drop-shadow(0 30px 60px rgba(0,0,0,0.7))',\n      },\n      closeShot: this.closeShot,\n      showChart: this.props.showChart ?? true,\n      showScreenshots: this.props.showScreenshots ?? true,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
